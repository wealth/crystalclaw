services:
  llama:
    build:
      context: .
      dockerfile: Dockerfile.llama
      args:
        RELEASE_TAG: th-quantize_individual_tensors-b4410-5e05f97
    container_name: crystalclaw-llama
    restart: unless-stopped
    volumes:
      - ./models:/models:ro
    environment:
      - MODEL_PATH=${LLAMA_MODEL_PATH:-/models/qwen3.5-4b.gguf}
      - CTX_SIZE=${LLAMA_CTX_SIZE:-4096}
      - N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-0}
    # OpenAI-compatible API available at http://llama:8080/v1 within the stack
    # Configure crystalclaw to use it via the openai provider with base_url=http://llama:8080/v1
    # or the ollama provider with base_url=http://llama:8080

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crystalclaw-gateway
    restart: unless-stopped
    ports:
      - "18791:18791"
    # volumes:
    #   - ./workspace/skills:/home/crystalclaw/.crystalclaw/workspace/skills:ro
    environment:
      - CRYSTALCLAW_POSTGRES_URL=${CRYSTALCLAW_POSTGRES_URL:-}
    depends_on:
      llama:
        condition: service_healthy
      postgres:
        condition: service_started
        required: false
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:18791/health" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: uncomment to use PostgreSQL backend
  # Set CRYSTALCLAW_POSTGRES_URL=postgres://crystalclaw:crystalclaw@postgres:5432/crystalclaw
  postgres:
    image: postgres:16-alpine
    container_name: crystalclaw-postgres
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_USER: crystalclaw
      POSTGRES_PASSWORD: crystalclaw
      POSTGRES_DB: crystalclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:


