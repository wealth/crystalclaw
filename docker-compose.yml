services:
  llama:
    build:
      context: .
      dockerfile: Dockerfile.llama
      args:
        RELEASE_TAG: main-b4466-d07d4c7
        AVX_LEVEL: avx2
    container_name: crystalclaw-llama
    restart: unless-stopped
    volumes:
      - llama_cache:/models
    environment:
      - HF_REPO=${LLAMA_HF_REPO:-lmstudio-community/Qwen3.5-4B-GGUF}
      - HF_FILE=${LLAMA_HF_FILE:-Qwen3.5-4B-Q4_K_M.gguf}
      - CTX_SIZE=${LLAMA_CTX_SIZE:-32768}
      - N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-0}
    # OpenAI-compatible API available at http://llama:8080/v1 within the stack
    # Configure crystalclaw to use it via the openai provider with base_url=http://llama:8080/v1
    # or the ollama provider with base_url=http://llama:8080

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crystalclaw-gateway
    restart: unless-stopped
    ports:
      - "18791:18791"
    environment:
      - CRYSTALCLAW_POSTGRES_URL=postgres://crystalclaw:crystalclaw@postgres:5432/crystalclaw
    depends_on:
      llama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:18791/health" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: crystalclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crystalclaw
      POSTGRES_PASSWORD: crystalclaw
      POSTGRES_DB: crystalclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crystalclaw -d crystalclaw"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  llama_cache:


